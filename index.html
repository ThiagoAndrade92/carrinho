<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce simples</title>
    <!-- CSS -->
    <link rel="stylesheet" href="estilos/style.css">
    <!------------------>
    <!-- BOOTSTRAP-ICON -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!------------------>
</head>

<body>
    <!-- HEADER -->
    <header class="header">

        <div class="cabecalho">
            <div class="logo">
                <img src="imgs/cake-logo.jpg" alt="logo" aria-label="logo" title="logo">
            </div><!-- logo -->
            <div class="btn-carrinho">
                <i class="bi bi-cart3"></i>
            </div><!-- carrinho -->
        </div><!-- cabecalho -->

    </header><!-- header -->
    <!------------------------------->
    <!-- MAIN -->
    <main class="main">

        <section class="vitrine">

            <div class="apagar">

                <div class="cards">

                    <div class="card-produto">
                        <div class="img-produto">
                            <img src="imgs/bolo-de-beijinho.jpg" alt="Bolo de beijinho">
                        </div><!-- img-produto -->
                        <h2 class="sabor">Bolo de beijinho</h2>
                        <p class="cifrao">R$ <span class="preco">50,00</span></p>
                        <div class="button">
                            <button class="btn" id="btn">Comprar</button>
                        </div><!-- button -->
                    </div><!-- card-produto -->

                    <div class="card-produto">
                        <div class="img-produto">
                            <img src="imgs/bolo-de-brigadeiro.jpg" alt="Bolo de brigadeiro">
                        </div><!-- img-produto -->
                        <h2 class="sabor">Bolo de brigadeiro</h2>
                        <p class="cifrao">R$ <span class="preco">50,00</span></p>
                        <div class="button">
                            <button class="btn" id="btn">Comprar</button>
                        </div><!-- button -->
                    </div><!-- card-produto -->

                    <div class="card-produto">
                        <div class="img-produto">
                            <img src="imgs/bolo-de-cenoura.jpg" alt="Bolo de beijinho">
                        </div><!-- img-produto -->
                        <h2 class="sabor">Bolo de cenoura</h2>
                        <p class="cifrao">R$ <span class="preco">50,00</span></p>
                        <div class="button">
                            <button class="btn" id="btn">Comprar</button>
                        </div><!-- button -->
                    </div><!-- card-produto -->

                    <div class="card-produto">
                        <div class="img-produto">
                            <img src="imgs/bolo-de-chocolate.webp" alt="Bolo de beijinho">
                        </div><!-- img-produto -->
                        <h2 class="sabor">Bolo de chocolate</h2>
                        <p class="cifrao">R$ <span class="preco">50,00</span></p>
                        <div class="button">
                            <button class="btn" id="btn">Comprar</button>
                        </div><!-- button -->
                    </div><!-- card-produto -->

                    <div class="card-produto">
                        <div class="img-produto">
                            <img src="imgs/bolo-de-fuba.jpg" alt="Bolo de beijinho">
                        </div><!-- img-produto -->
                        <h2 class="sabor">Bolo de fubá</h2>
                        <p class="cifrao">R$ <span class="preco">30,00</span></p>
                        <div class="button">
                            <button class="btn" id="btn">Comprar</button>
                        </div><!-- button -->
                    </div><!-- card-produto -->

                    <div class="card-produto">
                        <div class="img-produto">
                            <img src="imgs/bolo-de-morango.jpg" alt="Bolo de beijinho">
                        </div><!-- img-produto -->
                        <h2 class="sabor">Bolo de morango</h2>
                        <p class="cifrao">R$ <span class="preco">50,00</span></p>
                        <div class="button">
                            <button class="btn" id="btn">Comprar</button>
                        </div><!-- button -->
                    </div><!-- card-produto -->

                    <div class="card-produto">
                        <div class="img-produto">
                            <img src="imgs/bolo-gelado-de-coco.webp" alt="Bolo de beijinho">
                        </div><!-- img-produto -->
                        <h2 class="sabor">Bolo de bolo gelado de coco</h2>
                        <p class="cifrao">R$ <span class="preco">40,00</span></p>
                        <div class="button">
                            <button class="btn" id="btn">Comprar</button>
                        </div><!-- button -->
                    </div><!-- card-produto -->

                    <div class="card-produto">
                        <div class="img-produto">
                            <img src="imgs/bolo-mesclado.jpg" alt="Bolo de beijinho">
                        </div><!-- img-produto -->
                        <h2 class="sabor">Bolo mesclado</h2>
                        <p class="cifrao">R$ <span class="preco">50,00</span></p>
                        <div class="button">
                            <button class="btn" id="btn">Comprar</button>
                        </div><!-- button -->
                    </div><!-- card-produto -->

                </div><!-- cards -->

            </div><!-- apagar -->

            <div class="carrinho">
                <h1 class="texto-carrinho">Carrinho</h1>

                <table>
                    <!-- THEAD  -->
                    <thead>
                        <th>Sabor</th>
                        <th>Preço</th>
                        <th>Quantidade</th>
                        <th>Valor</th>
                    </thead>
                    <!-- TBODY  -->
                    <tbody>

                    </tbody>
                    <!-- TFOOT  -->
                    <tfoot>
                        <td class="tfoot-td" colspan="3">
                            <p class="text-total">TOTAL</p>
                        </td>
                        <td>
                            <p class="cifrao">R$ <span class="total"></span></p>
                        </td>
                    </tfoot>
                </table>

                <div class="finalizar-compra">
                    <button class="btn-finalizar-compra">Finalizar Compra</button>
                </div><!-- finalizar-compra-->

            </div><!-- carrinho-->

        </section><!-- vitrine -->

    </main><!-- main -->
    <!------------------------------->

    <script src="js/doceria.js"></script>
</body>

</html>
